services:  
  postgres:  
    image: postgres:16-alpine  
    environment:  
      POSTGRES_DB: todo_db  
      POSTGRES_USER: todo_user  
      POSTGRES_PASSWORD: todo_pass  
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo_user -d todo_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:  
      - "5433:5432"  
    volumes:  
      - postgres_data:/var/lib/postgresql/data  
  
volumes:  
  postgres_data: